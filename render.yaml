services:
  - type: web
    name: cybersecurity-agent-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cybersecurity-agent-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: LLM_PROVIDER
        value: openai
      # MVP bootstrap: creates tables in a fresh Render PostgreSQL database.
      # Replace with Alembic migrations before a production release.
      - key: APP_ENV
        value: development
      - key: LOG_LEVEL
        value: INFO

databases:
  - name: cybersecurity-agent-db
    databaseName: cybersecurity_agent
    user: cybersecurity_agent
    plan: free
